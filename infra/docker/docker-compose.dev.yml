version: "3.9"

services:
  backend:
    build:
      context: ../../backend
    container_name: wix_scanner_backend
    restart: unless-stopped
    env_file:
      - ../../backend/.env.example
    environment:
      WIX_SCANNER_ENVIRONMENT: development
      WIX_SCANNER_CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - ../../backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
    container_name: wix_scanner_frontend
    restart: unless-stopped
    env_file:
      - ../../frontend/.env.example
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_DEFAULT_LOCALE: es
    ports:
      - "5173:5173"
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: wix_scanner_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wix_scanner
      POSTGRES_USER: wix_scanner
      POSTGRES_PASSWORD: wix_scanner_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../docs/DB_SCHEMA.sql:/docker-entrypoint-initdb.d/01_db_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wix_scanner -d wix_scanner"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: wix_scanner_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
